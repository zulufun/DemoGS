input {
	beats {
		port => 5044
	}
	# Palo Alto can ship logs as syslog over UDP/TCP. Use 5514 to avoid privileged port 514.
	udp {
		port => 5514
		tags => ["paloalto", "syslog"]
	}

	tcp {
		port => 5514
		tags => ["paloalto", "syslog"]
	}

	tcp {
		port => 50000
	}
}

filter {
	if "paloalto" in [tags] {
		mutate {
			copy => { "message" => "[event][original]" }
		}

		# Strip the syslog envelope (RFC3164/RFC5424) when present.
		grok {
			match => {
				"message" => [
					"^%{SYSLOG5424PRI}%{GREEDYDATA:[panw][payload]}$",
					"^%{SYSLOGTIMESTAMP:[panw][syslog_timestamp]} %{HOSTNAME:[panw][syslog_host]} %{GREEDYDATA:[panw][payload]}$",
					"^%{GREEDYDATA:[panw][payload]}$"
				]
			}
		}

		csv {
			source => "[panw][payload]"
			separator => ","
			columns => [
				"future_use_1",
				"receive_time",
				"serial_number",
				"type",
				"subtype",
				"future_use_2",
				"generated_time",
				"src_ip",
				"dst_ip",
				"nat_src_ip",
				"nat_dst_ip",
				"rule_name",
				"src_user",
				"dst_user",
				"application",
				"vsys",
				"from_zone",
				"to_zone",
				"inbound_interface",
				"outbound_interface",
				"log_action"
			]
		}

		date {
			match => ["generated_time", "yyyy/MM/dd HH:mm:ss", "ISO8601"]
			target => "@timestamp"
		}

		mutate {
			lowercase => ["type", "subtype"]
			rename => {
				"type" => "[event][category]"
				"subtype" => "[event][type]"
				"serial_number" => "[observer][serial_number]"
				"src_ip" => "[source][ip]"
				"dst_ip" => "[destination][ip]"
				"application" => "[network][application]"
			}
		}
	}
}

output {
	if "paloalto" in [tags] {
		elasticsearch {
			hosts => "elasticsearch:9200"
			user => "logstash_internal"
			password => "${LOGSTASH_INTERNAL_PASSWORD}"
			index => "paloalto-logs-%{+YYYY.MM.dd}"
		}
	} else {
		elasticsearch {
			hosts => "elasticsearch:9200"
			user => "logstash_internal"
			password => "${LOGSTASH_INTERNAL_PASSWORD}"
		}
	}
}
