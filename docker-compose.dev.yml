version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: demo-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-demo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - demo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Python FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: demo-backend-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      VERTIV_BASE_URL: ${VERTIV_BASE_URL:-http://192.168.1.253}
      VERTIV_USERNAME: ${VERTIV_USERNAME:-admin}
      VERTIV_PASSWORD: ${VERTIV_PASSWORD:-Vertiv@123}
      VERTIV_STATUS_PATH: ${VERTIV_STATUS_PATH:-/}
      VERTIV_VERIFY_SSL: ${VERTIV_VERIFY_SSL:-false}
      VERTIV_REQUEST_TIMEOUT_SECONDS: ${VERTIV_REQUEST_TIMEOUT_SECONDS:-60}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - demo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # React Frontend (Vite Dev Server)
  frontend:
    image: node:20-alpine
    container_name: demo-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
      VITE_PRTG_URL: ${VITE_PRTG_URL}
      VITE_PRTG_USERNAME: ${VITE_PRTG_USERNAME}
      VITE_PRTG_PASSHASH: ${VITE_PRTG_PASSHASH}
      VITE_PRTG_COUNT: ${VITE_PRTG_COUNT:-1000}
      VITE_VERTIV_BASE_URL: ${VITE_VERTIV_BASE_URL:-http://192.168.1.253}
      VITE_VERTIV_USERNAME: ${VITE_VERTIV_USERNAME:-admin}
      VITE_VERTIV_PASSWORD: ${VITE_VERTIV_PASSWORD:-Vertiv@123}
      VITE_VERTIV_PATH: ${VITE_VERTIV_PATH:-/}
      VITE_VERTIV_REFRESH_MS: ${VITE_VERTIV_REFRESH_MS:-30000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - demo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  demo-network:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
